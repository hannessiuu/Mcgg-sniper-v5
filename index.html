<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>MCGG Anchor Sniper v5</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 10px; margin: 0; }
        .player-card { background: #1e1e1e; margin: 8px 0; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #444; }
        .is-target { border-left-color: #ff4444; background: #2c1a1a; }
        .is-fighting { opacity: 0.3; filter: grayscale(1); }
        button { padding: 10px 15px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        .btn-tanding { background: #ff9800; color: black; }
        .btn-reset { background: #444; color: white; width: 100%; padding: 15px; margin-top: 20px; }
        h2 { text-align: center; color: #ff4444; margin-bottom: 5px; }
        p { text-align: center; font-size: 0.8em; color: #888; }
    </style>
</head>
<body>
    <h2>SNIPER v5 ANCHOR</h2>
    <p>Tap "TANDING" jika lawan sedang bertarung di board lain</p>
    
    <div id="app"></div>
    <button class="btn-reset" onclick="resetAll()">RESET RONDE BARU</button>

    <script>
        const players = ["Lawan 1", "Lawan 2", "Lawan 3", "Lawan 4", "Lawan 5", "Lawan 6", "Lawan 7"];
        let state = players.map(name => ({ name, isFighting: false }));

        function render() {
            const container = document.getElementById('app');
            container.innerHTML = '';
            state.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = `player-card ${p.isFighting ? 'is-fighting' : 'is-target'}`;
                div.innerHTML = `
                    <span>${p.name} ${p.isFighting ? '' : '🎯'}</span>
                    <button class="btn-tanding" onclick="toggleFight(${i})">
                        ${p.isFighting ? 'BATAL' : 'TANDING'}
                    </button>
                `;
                container.appendChild(div);
            });
        }

        function toggleFight(index) {
            state[index].isFighting = !state[index].isFighting;
            render();
        }

        function resetAll() {
            state.forEach(p => p.isFighting = false);
            render();
        }

        render();
    </script>
</body>
</html>
